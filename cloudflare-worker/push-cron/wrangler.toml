name = "bible-quest-push-cron"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Cron: every 15 minutes. Free tier allows up to 5 triggers per worker.
[triggers]
crons = ["*/15 * * * *"]

[vars]
# ─── Public (safe to commit) ─────────────────────────────────────────────────
SUPABASE_URL      = "https://xybrbennsttjttxuxqoq.supabase.co"
VAPID_PUBLIC_KEY  = "BAoIDFvUiKGXWK-AsZb8EQF0I094k0VGCLE5h8h9TsZAuD_Knod02YLb3gOcgllRdvW9PlpaFwhaaQJpUezmvOs"

# CORS — restrict to the Bible Quest web app origin.
# Set to https://bible-quest-2026.vercel.app in production.
# Override per-environment via `wrangler deploy --var ALLOWED_ORIGIN:...` or
# edit [env.production] / [env.preview] blocks below.
ALLOWED_ORIGIN = "http://localhost:3000"

# ─── Secrets (set with `wrangler secret put` — NEVER commit) ─────────────────
#   SUPABASE_SERVICE_ROLE_KEY   — Supabase project service_role JWT
#   VAPID_PRIVATE_KEY           — 32-byte P-256 scalar, base64url-encoded
#   VAPID_SUBJECT               — mailto:laikaho0919@gmail.com
#   SUPABASE_JWT_SECRET         — Supabase project JWT signing secret
#                                 (Settings → API → JWT Secret)
#
# Example:
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put VAPID_PRIVATE_KEY
#   wrangler secret put VAPID_SUBJECT
#   wrangler secret put SUPABASE_JWT_SECRET

# ─── Per-environment overrides (optional) ────────────────────────────────────
# [env.production]
# name = "bible-quest-push-cron"
# vars = { ALLOWED_ORIGIN = "https://bible-quest-2026.vercel.app" }

# [env.preview]
# name = "bible-quest-push-cron-preview"
# vars = { ALLOWED_ORIGIN = "http://localhost:3000" }